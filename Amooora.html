/* ── PARTICLE CANVAS ── */
function ParticleCanvas({ color, active }) {
  const canvasRef = useRef(null);
  const stateRef = useRef({ particles: [], raf: null });

  useEffect(() => {
    if (!active) return;
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    const resize = () => {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    };
    resize();
    window.addEventListener('resize', resize);

    const count = 60;
    const particles = Array.from({ length: count }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 2.5 + 0.5,
      dx: (Math.random() - 0.5) * 0.4,
      dy: (Math.random() - 0.5) * 0.4,
      opacity: Math.random() * 0.5 + 0.2
    }));
    stateRef.current.particles = particles;

    const draw = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach((p) => {
        p.x += p.dx;p.y += p.dy;
        if (p.x < 0) p.x = canvas.width;
        if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height;
        if (p.y > canvas.height) p.y = 0;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = color + Math.round(p.opacity * 255).toString(16).padStart(2, '0');
        ctx.fill();
      });

      // draw connecting lines
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 120) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = color + Math.round((1 - dist / 120) * 40).toString(16).padStart(2, '0');
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
      stateRef.current.raf = requestAnimationFrame(draw);
    };
    draw();

    return () => {
      window.removeEventListener('resize', resize);
      cancelAnimationFrame(stateRef.current.raf);
    };
  }, [color, active]);

  if (!active) return null;
  return <canvas ref={canvasRef} id="particle-canvas" style={{ width: '100%', height: '100%' }} />;
}

/* ── VIDEO PARALLAX SECTION ── */
function VideoSection({ isMobile }) {
  const [offset, setOffset] = useState(0);
  const [muted, setMuted] = useState(true);
  const [ready, setReady] = useState(false);
  const [paused, setPaused] = useState(false);
  const ref = useRef(null);
  const playerRef = useRef(null);
  const divRef = useRef(null);

  // Parallax
  useEffect(() => {
    const onScroll = () => {
      if (!ref.current) return;
      setOffset(-ref.current.getBoundingClientRect().top * 0.3);
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  // Init YouTube IFrame API
  useEffect(() => {
    const init = () => {
      if (!divRef.current) return;
      playerRef.current = new window.YT.Player(divRef.current, {
        videoId: 'PHO5TkLfpKg',
        playerVars: {
          autoplay: 1, mute: 1, loop: 1,
          playlist: 'PHO5TkLfpKg', controls: 0,
          disablekb: 1, rel: 0, playsinline: 1,
          modestbranding: 1, iv_load_policy: 3
        },
        events: {
          onReady: (e) => {e.target.mute();e.target.playVideo();setReady(true);},
          onStateChange: (e) => {
            if (e.data === 0) e.target.playVideo();
            if (e.data === 1) setPaused(false);
            if (e.data === 2) setPaused(true);
          }
        }
      });
    };

    if (window.YT && window.YT.Player) {
      init();
    } else {
      if (!document.getElementById('yt-api')) {
        const s = document.createElement('script');
        s.id = 'yt-api';
        s.src = 'https://www.youtube.com/iframe_api';
        document.head.appendChild(s);
      }
      window.onYouTubeIframeAPIReady = init;
    }
    return () => {if (playerRef.current?.destroy) playerRef.current.destroy();};
  }, []);

  // React to mute state
  useEffect(() => {
    if (!ready || !playerRef.current) return;
    if (muted) {
      playerRef.current.mute();
    } else {
      playerRef.current.unMute();
      playerRef.current.setVolume(80);
    }
  }, [muted, ready]);

  const toggleMute = (e) => {
    e.stopPropagation();
    setMuted((m) => !m);
  };

  const togglePlay = (e) => {
    e.stopPropagation();
    if (!ready || !playerRef.current) return;
    if (paused) {
      playerRef.current.playVideo();
      setPaused(false);
    } else {
      playerRef.current.pauseVideo();
      setPaused(true);
    }
  };

  return (
    <section ref={ref} style={{
      position: 'relative', height: isMobile ? '56vh' : '70vh', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      userSelect: 'none'
    }}>
      {/* Video layer — pointer-events: none so clicks never reach iframe */}
      <div style={{
        position: 'absolute', inset: 0,
        transform: `translateY(${isMobile ? 0 : offset}px)`,
        pointerEvents: 'none',
        zIndex: 0
      }}>
        <div ref={divRef} style={{
          position: 'absolute',
          top: isMobile ? '0%' : '-20%', left: isMobile ? '0%' : '-10%',
          width: isMobile ? '100%' : '120%', height: isMobile ? '100%' : '140%',
          border: 'none'
        }} />
      </div>

      {/* Overlay — also blocks clicks to iframe */}
      <div style={{
        position: 'absolute', inset: 0, zIndex: 1,
        background: 'linear-gradient(to bottom, rgba(26,15,46,0.55) 0%, rgba(147,45,111,0.35) 50%, rgba(26,15,46,0.7) 100%)',
        pointerEvents: 'none'
      }} />

      {/* Text */}
      <div style={{ position: 'relative', zIndex: 2, textAlign: 'center', padding: '0 32px', pointerEvents: 'none' }}>
        <p style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 12, letterSpacing: '0.22em',
          textTransform: 'uppercase', color: 'rgba(255,255,255,0.7)', marginBottom: 16 }}>
          {C.video.eyebrow}
        </p>
        <h2 style={{ fontFamily: "'Playfair Display',serif",
          fontSize: 'clamp(32px,5vw,72px)', fontWeight: 900,
          color: 'white', lineHeight: 1.1, textShadow: '0 4px 32px rgba(0,0,0,0.4)' }}>

      </div>

      {/* Video controls */}
      <div style={{
        position: 'absolute', bottom: 28, right: 28, zIndex: 10,
        display: 'flex', gap: 10, pointerEvents: 'auto'
      }}>
        <button onClick={togglePlay} style={{
          width: 48, height: 48, borderRadius: '50%',
          background: 'rgba(255,255,255,0.18)',
          backdropFilter: 'blur(8px)',
          border: '1.5px solid rgba(255,255,255,0.35)',
          cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
          transition: 'background 0.2s', color: 'white'
        }}
        onMouseEnter={(e) => e.currentTarget.style.background = 'rgba(255,255,255,0.3)'}
        onMouseLeave={(e) => e.currentTarget.style.background = 'rgba(255,255,255,0.18)'}
        title={paused ? 'Reproduzir' : 'Pausar'}>
          {paused ?
          <span style={{
            width: 0, height: 0,
            borderTop: '8px solid transparent',
            borderBottom: '8px solid transparent',
            borderLeft: '12px solid white',
            marginLeft: 2
          }} /> :
          <span style={{ display: 'flex', gap: 4 }}>
              <span style={{ width: 3, height: 14, background: 'white', borderRadius: 2 }} />
              <span style={{ width: 3, height: 14, background: 'white', borderRadius: 2 }} />
            </span>

        </button>

        <button onClick={toggleMute} style={{

          background: 'rgba(255,255,255,0.18)',
          backdropFilter: 'blur(8px)',

        onMouseLeave={(e) => e.currentTarget.style.background = 'rgba(255,255,255,0.18)'}
        title={muted ? 'Ativar som' : 'Silenciar'}>
          <span style={{ position: 'relative', display: 'inline-flex', width: 20, height: 20, alignItems: 'center', justifyContent: 'center' }}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M4 10H8L13 6V18L8 14H4V10Z" stroke="white" strokeWidth="1.8" strokeLinejoin="round" />
              {!muted && <path d="M16 9C17.2 10 17.2 14 16 15" stroke="white" strokeWidth="1.8" strokeLinecap="round" />}
              {!muted && <path d="M18.5 7.5C21 9.8 21 14.2 18.5 16.5" stroke="white" strokeWidth="1.8" strokeLinecap="round" />}

}


function Manifesto({ accent, dir, isMobile }) {

          gridTemplateRows: isMobile ? 'repeat(2, 200px)' : '280px',
          gap: 12
        }}>
          {photos.map((src, i) =>
          <div key={i} style={{
            borderRadius: 16, overflow: 'hidden', position: 'relative',
            background: '#F5EBFF',
            opacity: visible ? 1 : 0, transform: visible ? 'none' : 'scale(0.96)',
            transition: `all 0.7s ${0.05 * i}s ease`
          }}
          onMouseEnter={(e) => {e.currentTarget.style.transform = 'scale(1.02)';e.currentTarget.style.zIndex = '2';e.currentTarget.style.boxShadow = `0 20px 60px ${accent}33`;}}
          onMouseLeave={(e) => {e.currentTarget.style.transform = '';e.currentTarget.style.zIndex = '';e.currentTarget.style.boxShadow = '';}}>
              <div style={{
                width: '100%', height: '100%',
                backgroundImage: `url(${src})`,
                backgroundSize: 'cover', backgroundPosition: 'center'
              }} />
            </div>
          )}
        </div>

        <div style={{ textAlign: 'center', marginTop: 48,
          opacity: visible ? 1 : 0, transition: 'all 0.7s 0.5s ease' }}>
          <a href={C.gallery.ctaUrl} style={{
            display: 'inline-block',
            fontFamily: "'DM Sans',sans-serif", fontSize: 15, fontWeight: 600,
            background: accent, color: 'white', padding: '14px 32px', borderRadius: 100,
            textDecoration: 'none', boxShadow: `0 8px 32px ${accent}44`,
            transition: 'all 0.25s'
          }}
          onMouseEnter={(e) => {e.currentTarget.style.transform = 'translateY(-2px)';e.currentTarget.style.boxShadow = `0 12px 40px ${accent}55`;}}
          onMouseLeave={(e) => {e.currentTarget.style.transform = '';e.currentTarget.style.boxShadow = `0 8px 32px ${accent}44`;}}>
            {C.gallery.cta}
          </a>
        </div>
      </div>
    </section>);

}

/* ── FOOTER ── */
function Newsletter({ accent, isMobile }) {
  return (
    <section style={{ background: 'var(--white)', padding: '48px 48px 36px' }}>
      <div style={{
        maxWidth: 1200, margin: '0 auto',
        display: 'grid', gridTemplateColumns: isMobile ? '1fr' : '1.1fr 1.9fr', gap: 24, alignItems: 'center'
      }}>
        <h3 style={{
          fontFamily: "'DM Sans',sans-serif", fontSize: isMobile ? '22px' : 'clamp(14px,1.6vw,21px)',
          lineHeight: 1.2, fontWeight: 700, color: '#0f1b3d'
        }}>
          {C.newsletter.title}
        </h3>

        <form onSubmit={(e) => e.preventDefault()} style={{ display: 'flex', gap: 10, alignItems: 'center', flexDirection: isMobile ? 'column' : 'row' }}>
          <input
            type="email"
            placeholder={C.newsletter.placeholder}
            aria-label={C.newsletter.placeholder}
            style={{
              flex: 1,
              minHeight: 54,
              borderRadius: 8,
              border: '1px solid #e8eaf2',
              padding: '0 16px',
              fontFamily: "'DM Sans',sans-serif",
              fontSize: 18,
              color: '#0f1b3d',
              outline: 'none',
              width: '100%'
            }}
          />
          <button type="submit" style={{
            minHeight: 54,
            padding: '0 20px',
            borderRadius: 8,
            border: 'none',
            background: accent,
            color: 'white',
            fontFamily: "'DM Sans',sans-serif",
            fontSize: 15,
            fontWeight: 700,
            letterSpacing: '0.02em',
            cursor: 'pointer',
            whiteSpace: 'nowrap',
            width: isMobile ? '100%' : 'auto'
          }}>
            {C.newsletter.button}
          </button>
        </form>
      </div>
    </section>
  );
}

function Footer({ accent, isMobile }) {
  return (
    <footer style={{ background: accent, color: 'white', padding: isMobile ? '56px 20px 28px' : '80px 48px 40px' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : '2fr 1fr 1fr', gap: isMobile ? 36 : 60, marginBottom: 64 }}>
          <div>
            <img src="images/logo.png" alt="Amooora" style={{ height: 52, objectFit: 'contain', marginBottom: 16, filter: 'brightness(0) invert(1)' }} />
            <p style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 14, color: 'rgba(255,255,255,0.5)',
              lineHeight: 1.8, maxWidth: 320, fontWeight: 300 }}>
              {C.footer.description}
            </p>
            <div style={{ display: 'flex', gap: 12, marginTop: 24 }}>
              <a href={C.footer.instagramUrl} style={{
                fontFamily: "'DM Sans',sans-serif", fontSize: 12, color: accent,
                textDecoration: 'none', opacity: 0.8 }}>{C.footer.instagram}</a>
              <span style={{ color: 'rgba(255,255,255,0.2)' }}>·</span>
              <a href={`mailto:${C.footer.email}`} style={{
                fontFamily: "'DM Sans',sans-serif", fontSize: 12, color: 'rgba(255,255,255,0.5)',
                textDecoration: 'none' }}>{C.footer.email}</a>
            </div>
          </div>
          <div>
            <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 11, fontWeight: 600,
              letterSpacing: '0.15em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.3)', marginBottom: 20 }}>
              {C.footer.navLabel}
            </div>
            {C.footer.navLinks.map((l) => <a key={l} href="#" style={{ display: 'block', fontFamily: "'DM Sans',sans-serif",
              fontSize: 14, color: 'rgba(255,255,255,0.6)', textDecoration: 'none',
              marginBottom: 12, transition: 'color 0.2s' }}
            onMouseEnter={(e) => e.target.style.color = 'white'}
            onMouseLeave={(e) => e.target.style.color = 'rgba(255,255,255,0.6)'}>
                {l}
              </a>
            )}
          </div>
          <div>
            <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 11, fontWeight: 600,
              letterSpacing: '0.15em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.3)', marginBottom: 20 }}>
              {C.footer.appLabel}
            </div>
            {C.footer.appLinks.map((l) =>
            <a key={l} href="#" style={{ display: 'block', fontFamily: "'DM Sans',sans-serif",
              fontSize: 14, color: 'rgba(255,255,255,0.6)', textDecoration: 'none',
              marginBottom: 12, transition: 'color 0.2s' }}
            onMouseEnter={(e) => e.target.style.color = 'white'}
            onMouseLeave={(e) => e.target.style.color = 'rgba(255,255,255,0.6)'}>
                {l}
              </a>
            )}
          </div>
        </div>

        <div style={{ borderTop: '1px solid rgba(255,255,255,0.08)', paddingTop: 32,
          display: 'flex', justifyContent: 'space-between', alignItems: isMobile ? 'flex-start' : 'center', flexDirection: isMobile ? 'column' : 'row', flexWrap: 'wrap', gap: 12 }}>
          <span style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 12, color: 'rgba(255,255,255,0.3)' }}>
            {C.footer.copyright}
          </span>
          <span style={{ fontFamily: "'Playfair Display',serif", fontSize: 12, color: accent, fontStyle: 'italic', opacity: 0.6 }}>
            {C.footer.signature}
          </span>
        </div>
      </div>
    </footer>);

}

/* ── MAIN APP ── */
function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [isMobile, setIsMobile] = useState(window.innerWidth <= 900);
  const dir = t.direction;
  const accent = '#9B417C';
  const particles = t.showParticles;

  useEffect(() => {
    document.title = C.site.title;
    const onResize = () => setIsMobile(window.innerWidth <= 900);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  return (
    <div>
      <Nav accent={accent} dir={dir} isMobile={isMobile} />

      {dir === 'A' ?
      <HeroA accent={accent} particles={particles} isMobile={isMobile} /> :

      <HeroB accent={accent} particles={particles} />
      }

      <Marquee accent={accent} />
      <VideoSection isMobile={isMobile} />
      <Manifesto accent={accent} dir={dir} isMobile={isMobile} />
      <AppSection accent={accent} isMobile={isMobile} />
      <Values accent={accent} isMobile={isMobile} />
      <Gallery accent={accent} isMobile={isMobile} />
      <FAQ accent={accent} isMobile={isMobile} />
      <Newsletter accent={accent} isMobile={isMobile} />
      <Footer accent={accent} isMobile={isMobile} />

      <TweaksPanel>
        <TweakSection label="Direção de Design" />
        <TweakRadio label="Estilo"
        value={t.direction}
        options={[
        { value: 'A', label: 'A — Editorial Clean' },
        { value: 'B', label: 'B — Split Imersivo' }]
        }
        onChange={(v) => setTweak('direction', v)} />
        <TweakSection label="Visual" />
        <TweakToggle label="Partículas no hero" value={t.showParticles} onChange={(v) => setTweak('showParticles', v)} />
      </TweaksPanel>
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
